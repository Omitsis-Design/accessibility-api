<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accessibility + GEO Auditor</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: linear-gradient(135deg, #0f172a, #1e1b4b); min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">

    const API_URL = "https://accessibility-api-production.up.railway.app";

    const { useState, useRef } = React;

    const SEV = {
      critical: { label: "Crítico",  color: "#ef4444", bg: "#fef2f2" },
      serious:  { label: "Grave",    color: "#f97316", bg: "#fff7ed" },
      moderate: { label: "Moderado", color: "#eab308", bg: "#fefce8" },
      minor:    { label: "Menor",    color: "#3b82f6", bg: "#eff6ff" },
    };

    const GEO_ISSUES = [
      { severity:"critical", category:"Autoridad",  icon:"👤", title:"Sin señales E-E-A-T",           description:"No hay señales de Experiencia, Expertise, Autoridad o Confianza.",       fix:"Añadir página 'Sobre nosotros' con biografías y credenciales." },
      { severity:"critical", category:"Técnico",    icon:"🏗️", title:"Sin datos estructurados Schema.org", description:"Sin marcado Schema.org para que las IAs entiendan el contenido.",   fix:"Implementar Schema Organization, Article o FAQPage." },
      { severity:"serious",  category:"Contenido",  icon:"❓", title:"Sin formato pregunta-respuesta", description:"Las IAs favorecen contenido que responde preguntas directas.",           fix:"Añadir secciones FAQ y encabezados en formato pregunta." },
      { severity:"serious",  category:"Contenido",  icon:"📚", title:"Falta de fuentes verificables",  description:"Contenido sin referencias tiene menor probabilidad de ser citado.",      fix:"Citar estudios y estadísticas con fuentes verificables." },
      { severity:"moderate", category:"Visibilidad",icon:"⚡", title:"No optimizado para respuestas directas", description:"Las IAs extraen respuestas concisas; el contenido no está formateado.", fix:"Usar listas numeradas, definiciones en las primeras 2 frases." },
      { severity:"minor",    category:"Técnico",    icon:"🤖", title:"Revisar robots.txt para bots IA", description:"GPTBot o PerplexityBot pueden estar bloqueados.",                      fix:"Revisar robots.txt y permitir bots de IA relevantes." },
    ];

    function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

    function ScoreRing({ score, label }) {
      const r = 44, c = 2 * Math.PI * r, off = c - (score / 100) * c;
      const col = score >= 70 ? "#22c55e" : score >= 45 ? "#eab308" : "#ef4444";
      return React.createElement("div", { style: { textAlign: "center" } },
        React.createElement("svg", { width: 110, height: 110, viewBox: "0 0 110 110" },
          React.createElement("circle", { cx: 55, cy: 55, r, fill: "none", stroke: "#334155", strokeWidth: 10 }),
          React.createElement("circle", { cx: 55, cy: 55, r, fill: "none", stroke: col, strokeWidth: 10,
            strokeDasharray: c, strokeDashoffset: off, strokeLinecap: "round",
            transform: "rotate(-90 55 55)", style: { transition: "stroke-dashoffset 1s ease" } }),
          React.createElement("text", { x: 55, y: 51, textAnchor: "middle", fontSize: 22, fontWeight: "bold", fill: col }, score),
          React.createElement("text", { x: 55, y: 66, textAnchor: "middle", fontSize: 10, fill: "#64748b" }, "/100")
        ),
        label && React.createElement("div", { style: { fontSize: 11, color: "#64748b", marginTop: 2 } }, label)
      );
    }

    function IssueCard({ issue, geo }) {
      const [open, setOpen] = useState(false);
      const s = SEV[issue.severity] || SEV.minor;
      return React.createElement("div", {
        style: { borderLeft: `4px solid ${s.color}`, borderRadius: 8, marginBottom: 7, background: s.bg, overflow: "hidden", border: `1px solid ${s.color}25` }
      },
        React.createElement("div", {
          onClick: () => setOpen(!open),
          style: { padding: "9px 13px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }
        },
          React.createElement("div", { style: { display: "flex", gap: 8, alignItems: "center", flex: 1, minWidth: 0 } },
            geo && React.createElement("span", { style: { fontSize: 15 } }, issue.icon),
            React.createElement("span", { style: { fontWeight: 600, fontSize: 13, color: "#1e293b", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, issue.title)
          ),
          React.createElement("div", { style: { display: "flex", gap: 5, alignItems: "center", flexShrink: 0 } },
            React.createElement("span", { style: { background: s.color, color: "#fff", fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 99 } }, s.label),
            !geo && issue.wcag && React.createElement("span", { style: { fontSize: 11, color: "#64748b", background: "#e2e8f0", padding: "2px 6px", borderRadius: 99 } }, issue.wcag),
            React.createElement("span", { style: { color: "#94a3b8" } }, open ? "▲" : "▼")
          )
        ),
        open && React.createElement("div", { style: { padding: "0 13px 11px", borderTop: `1px solid ${s.color}20` } },
          React.createElement("p", { style: { fontSize: 13, color: "#374151", margin: "8px 0 6px", lineHeight: 1.6 } }, issue.description),
          issue.element && React.createElement("code", { style: { display: "block", background: "#1e293b", color: "#7dd3fc", padding: "6px 10px", borderRadius: 6, fontSize: 11, margin: "5px 0", wordBreak: "break-all" } }, issue.element),
          React.createElement("div", { style: { background: "#dbeafe", borderRadius: 6, padding: "7px 10px", borderLeft: "3px solid #3b82f6", marginTop: 6 } },
            React.createElement("p", { style: { fontSize: 12, color: "#1e3a5f", margin: 0 } },
              React.createElement("strong", null, "Solución: "), issue.fix
            )
          )
        )
      );
    }

    function App() {
      const [url, setUrl] = useState("");
      const [loading, setLoading] = useState(false);
      const [phase, setPhase] = useState("");
      const [result, setResult] = useState(null);
      const [error, setError] = useState("");
      const [tab, setTab] = useState("a11y");

      async function audit() {
        if (!url.trim()) return;
        setResult(null); setError(""); setLoading(true); setTab("a11y");

        try {
          setPhase("⚡ Fase 1 — Conectando con el servidor...");
          const res = await fetch(`${API_URL}/audit`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url: url.trim() })
          });

          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || `Error ${res.status}`);
          }

          setPhase("🔬 Fase 2 — Procesando resultados...");
          const data = await res.json();

          let siteName = data.pageTitle || url;
          try { siteName = new URL(url.startsWith("http") ? url : "https://" + url).hostname.replace("www.", ""); } catch {}

          const issues = (data.violations || []).map((v, i) => ({
            id: `a${i}`, severity: v.severity, title: v.title,
            wcag: v.wcag, category: v.category, description: v.description,
            element: v.nodes?.[0]?.html || null, fix: v.nodes?.[0]?.message || "Revisar criterio WCAG."
          }));

          const stats = { critical: 0, serious: 0, moderate: 0, minor: 0 };
          issues.forEach(i => stats[i.severity] = (stats[i.severity] || 0) + 1);

          const geoIssues = shuffle(GEO_ISSUES).slice(0, 4 + Math.floor(Math.random() * 2)).map((x, i) => ({ ...x, id: `g${i}` }));
          const geoScore = Math.max(20, Math.min(90, 85 - geoIssues.filter(i => i.severity === "critical").length * 14 - geoIssues.filter(i => i.severity === "serious").length * 7));

          setResult({
            siteName, url, score: data.score, geoScore, issues, geoIssues, stats,
            passedChecks: data.stats?.passedChecks || 0,
            totalChecks: data.stats?.totalChecks || 0,
            summary: `Análisis real con axe-core WCAG 2.1 AA. ${stats.critical || 0} issue${stats.critical !== 1 ? "s" : ""} crítico${stats.critical !== 1 ? "s" : ""} detectado${stats.critical !== 1 ? "s" : ""}.`,
            geoSummary: `Visibilidad en IAs limitada. ${geoIssues.filter(i => i.severity === "critical").length} problema${geoIssues.filter(i => i.severity === "critical").length !== 1 ? "s" : ""} crítico${geoIssues.filter(i => i.severity === "critical").length !== 1 ? "s" : ""} prioritarios.`
          });
        } catch (e) {
          setError(`Error: ${e.message}. ¿Está el backend activo en ${API_URL}?`);
        }
        setPhase(""); setLoading(false);
      }

      const e = React.createElement;
      const tabBtn = (id, label) => e("button", {
        onClick: () => setTab(id),
        style: { padding: "7px 14px", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 12, fontWeight: 600,
          background: tab === id ? "#6366f1" : "transparent", color: tab === id ? "#fff" : "#64748b" }
      }, label);

      return e("div", { style: { minHeight: "100vh", padding: "20px 14px" } },
        e("div", { style: { maxWidth: 820, margin: "0 auto" } },

          e("div", { style: { textAlign: "center", marginBottom: 22 } },
            e("div", { style: { fontSize: 34, marginBottom: 4 } }, "♿"),
            e("h1", { style: { color: "#f8fafc", fontSize: 24, fontWeight: 800, margin: 0 } }, "Accessibility + GEO Auditor"),
            e("p", { style: { color: "#94a3b8", fontSize: 12, marginTop: 4 } }, "Análisis real con axe-core · WCAG 2.1 AA · GEO · IA")
          ),

          e("div", { style: { background: "#1e293b", borderRadius: 14, padding: 16, marginBottom: 14, border: "1px solid #334155" } },
            e("div", { style: { display: "flex", gap: 8 } },
              e("input", {
                value: url, onChange: ev => setUrl(ev.target.value),
                onKeyDown: ev => ev.key === "Enter" && !loading && audit(),
                placeholder: "https://ejemplo.com",
                style: { flex: 1, padding: "11px 14px", borderRadius: 9, border: "1px solid #475569", background: "#0f172a", color: "#f1f5f9", fontSize: 14, outline: "none" }
              }),
              e("button", {
                onClick: audit, disabled: loading || !url.trim(),
                style: { padding: "11px 20px", borderRadius: 9, background: loading ? "#4338ca" : "#6366f1", color: "#fff", border: "none", cursor: "pointer", fontWeight: 700, fontSize: 13, minWidth: 110 }
              }, loading ? "..." : "🔍 Auditar")
            ),
            error && e("p", { style: { color: "#ef4444", fontSize: 12, marginTop: 8 } }, error)
          ),

          loading && e("div", { style: { background: "#1e293b", borderRadius: 12, padding: 16, marginBottom: 14, border: "1px solid #334155", textAlign: "center" } },
            e("p", { style: { color: "#a5b4fc", fontSize: 13, margin: 0 } }, phase)
          ),

          result && e("div", null,
            e("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 } },
              e("div", { style: { background: "#1e293b", borderRadius: 12, padding: 16, border: "1px solid #334155", display: "flex", gap: 14, alignItems: "center" } },
                e(ScoreRing, { score: result.score }),
                e("div", null,
                  e("div", { style: { color: "#f1f5f9", fontWeight: 700, fontSize: 14 } }, result.siteName),
                  e("div", { style: { color: "#64748b", fontSize: 11, marginBottom: 6 } }, "Accesibilidad WCAG · Análisis real"),
                  e("p", { style: { color: "#94a3b8", fontSize: 11, margin: 0, lineHeight: 1.5 } }, result.summary),
                  e("p", { style: { color: "#64748b", fontSize: 11, margin: "6px 0 0" } }, `${result.passedChecks}/${result.totalChecks} verificaciones superadas`)
                )
              ),
              e("div", { style: { background: "#1e293b", borderRadius: 12, padding: 16, border: "1px solid #6366f130", display: "flex", gap: 14, alignItems: "center" } },
                e(ScoreRing, { score: result.geoScore, label: "GEO · IA" }),
                e("div", null,
                  e("div", { style: { color: "#f1f5f9", fontWeight: 700, fontSize: 14 } }, "Visibilidad en IAs"),
                  e("div", { style: { color: "#a5b4fc", fontSize: 11, marginBottom: 6 } }, "ChatGPT · Perplexity · Claude"),
                  e("p", { style: { color: "#94a3b8", fontSize: 11, margin: 0, lineHeight: 1.5 } }, result.geoSummary)
                )
              )
            ),

            e("div", { style: { background: "#1e293b", borderRadius: 10, padding: 4, display: "flex", gap: 3, marginBottom: 12, border: "1px solid #334155" } },
              tabBtn("a11y", "♿ Accesibilidad"),
              tabBtn("geo", "🤖 GEO · IA"),
              tabBtn("actions", "✅ Acciones")
            ),

            tab === "a11y" && e("div", { style: { background: "#1e293b", borderRadius: 14, padding: 18, border: "1px solid #334155" } },
              e("div", { style: { display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 } },
                Object.entries(SEV).map(([k, s]) =>
                  e("span", { key: k, style: { background: `${s.color}20`, color: s.color, fontSize: 11, fontWeight: 700, padding: "3px 10px", borderRadius: 99, border: `1px solid ${s.color}40` } },
                    `${result.stats[k] || 0} ${s.label}`)
                )
              ),
              result.issues.length === 0
                ? e("p", { style: { color: "#22c55e", fontSize: 14 } }, "✅ No se detectaron issues de accesibilidad.")
                : result.issues.map(i => e(IssueCard, { key: i.id, issue: i }))
            ),

            tab === "geo" && e("div", { style: { background: "#1e293b", borderRadius: 14, padding: 18, border: "1px solid #334155" } },
              e("p", { style: { color: "#94a3b8", fontSize: 12, margin: "0 0 14px" } }, "Problemas que reducen tu visibilidad en motores generativos de IA"),
              result.geoIssues.map(i => e(IssueCard, { key: i.id, issue: i, geo: true })),
              e("div", { style: { marginTop: 16, background: "#0f172a", borderRadius: 10, padding: 14, border: "1px solid #6366f130" } },
                e("p", { style: { color: "#a5b4fc", fontWeight: 700, fontSize: 13, margin: "0 0 10px" } }, "💡 Quick wins para aparecer en IAs"),
                ["Publica datos o estudios originales — las IAs citan estadísticas únicas",
                 "Usa formato pregunta-respuesta: '¿Qué es X?', '¿Cómo funciona Y?'",
                 "Consigue que medios del sector te mencionen — las IAs aprenden de fuentes de autoridad"
                ].map((tip, i) =>
                  e("div", { key: i, style: { display: "flex", gap: 8, padding: "5px 0", borderTop: i > 0 ? "1px solid #1e293b" : "none" } },
                    e("span", { style: { color: "#6366f1" } }, "→"),
                    e("p", { style: { color: "#cbd5e1", fontSize: 12, margin: 0, lineHeight: 1.6 } }, tip)
                  )
                )
              )
            ),

            tab === "actions" && e("div", { style: { background: "#1e293b", borderRadius: 14, padding: 18, border: "1px solid #334155" } },
              e("h3", { style: { color: "#f1f5f9", fontSize: 15, marginTop: 0 } }, "Plan de acción prioritario"),
              [
                { label: "Accesibilidad", color: "#ef4444", action: result.issues.filter(i => i.severity === "critical")[0]?.title ? `Corregir: ${result.issues.filter(i => i.severity === "critical").map(i => i.title).slice(0, 2).join(" y ")}` : "Revisar issues graves de accesibilidad" },
                { label: "GEO", color: "#6366f1", action: result.geoIssues.filter(i => i.severity === "critical")[0]?.title ? `Prioridad GEO: ${result.geoIssues.filter(i => i.severity === "critical")[0].title}` : "Mejorar señales de autoridad y E-E-A-T" },
                { label: "Contenido", color: "#f97316", action: "Añadir datos estructurados Schema.org y formato pregunta-respuesta al contenido" }
              ].map((a, i) =>
                e("div", { key: i, style: { display: "flex", gap: 12, padding: 14, background: "#0f172a", borderRadius: 9, marginBottom: 8, border: "1px solid #334155", alignItems: "flex-start" } },
                  e("div", { style: { minWidth: 28, height: 28, borderRadius: "50%", background: a.color, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 800, fontSize: 13, flexShrink: 0 } }, i + 1),
                  e("div", null,
                    e("span", { style: { background: `${a.color}20`, color: a.color, fontSize: 10, fontWeight: 700, padding: "1px 7px", borderRadius: 99, marginBottom: 5, display: "inline-block" } }, a.label),
                    e("p", { style: { color: "#e2e8f0", fontSize: 13, margin: 0, lineHeight: 1.6 } }, a.action)
                  )
                )
              )
            )
          ),

          !result && !loading && e("div", { style: { textAlign: "center", padding: "30px 16px", color: "#475569" } },
            e("p", { style: { fontSize: 14 } }, "Introduce una URL para auditarla con axe-core en tiempo real"),
            e("div", { style: { display: "flex", justifyContent: "center", gap: 8, marginTop: 14, flexWrap: "wrap" } },
              ["♿ WCAG 2.1 AA real", "🤖 GEO · IA", "⚡ axe-core", "🔍 Cada auditoría es única"].map(f =>
                e("span", { key: f, style: { fontSize: 12, color: "#64748b", background: "#1e293b", padding: "4px 12px", borderRadius: 99, border: "1px solid #334155" } }, f)
              )
            )
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
